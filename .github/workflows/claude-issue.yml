name: Claude on labeled issue
on:
  issues:
    types: [labeled]

jobs:
  claude:
    # Fire on claude-ready label apply. GitHub's `triage+` permission already
    # gates who can apply labels — random PR authors and outside contributors
    # cannot. Trusting the label IS the trust gate; no per-repo allowlist needed.
    # Forks inherit this naturally (the fork owner has admin → can label;
    # outsiders cannot).
    if: github.event.label.name == 'claude-ready'

    # Serialize worker runs per issue. Prevents two simultaneous events on the
    # same issue (e.g. the orchestrator's two-step dispatch) from racing.
    concurrency:
      group: worker-${{ github.event.issue.number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Worker instructions live in `.claude/skills/arcane-worker/`
      # (progressive-disclosure skill). The skill auto-detects mode (fresh / continue / blocker)
      # from issue body + PR existence and only loads the relevant mode file plus references
      # as needed. Keeps per-invocation context cost low.
      - uses: anthropics/claude-code-action@v1
        with:
          # `allowed_bots: '*'` lets bot-triggered runs through.
          # The orchestrator (running as a bot) applies `claude-ready` to dispatch this worker;
          # without this, claude-code-action's default bot-trigger refusal blocks every dispatch.
          # Identity-level safety stays gated by the job `if:` above (sender == martinjms OR
          # the issue carries `claude-working` — which only the orchestrator applies).
          allowed_bots: '*'
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model haiku --dangerously-skip-permissions"
          settings: '{"advisorModel": "opus"}'
          prompt: |
            Issue: #${{ github.event.issue.number }} — "${{ github.event.issue.title }}"
            Repo: ${{ github.repository }}
            Sender that triggered this: ${{ github.event.sender.login }}

            Issue body:
            ${{ github.event.issue.body }}

            Run /arcane-worker. Determine mode (fresh / continue / blocker) from the issue body and current PR state per the skill's mode router, then execute that mode's playbook from `.claude/skills/arcane-worker/modes/`. Read references in `.claude/skills/arcane-worker/references/` as needed.
