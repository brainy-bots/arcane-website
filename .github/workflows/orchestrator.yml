name: Orchestrator
on:
  issues:
    types: [labeled, unlabeled]
  pull_request:
    types: [opened, ready_for_review, closed, synchronize]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

jobs:
  orchestrate:
    # Fire only on events the orchestrator can actually act on:
    #   1. PRs whose base is an epic/* branch (worker-opened sub-PRs). NOT the
    #      epic→main PR — that's a founder action and the orchestrator must not
    #      react to founder-driven merges, closes, syncs, etc.
    #   2. Issue label changes for labels the orchestrator manages. Other label
    #      changes (e.g. project-management labels) don't trigger.
    #   3. Comments on issues/PRs that look like our patterns (BLOCKER prefix
    #      from a worker, or a comment under an active epic).
    #
    # This filter intentionally excludes the founder merging the epic→main PR —
    # the orchestrator's job ends when sub-PRs land in the epic branch; the
    # founder's final merge is theirs to do without interference.
    if: |
      (
        github.event.pull_request != null
        && startsWith(github.event.pull_request.base.ref, 'epic/')
      )
      || (
        github.event.label != null
        && contains(fromJSON('["orchestration-active","claude-working","claude-ready","action-required","unblock","awaiting-founder-review","failed-attempt","restart-epic"]'), github.event.label.name)
      )
      || (
        github.event.comment != null
        && (
          startsWith(github.event.comment.body, 'BLOCKER from sub-issue #')
          || contains(github.event.issue.labels.*.name, 'orchestration-active')
          || contains(github.event.pull_request.labels.*.name, 'orchestration-active')
        )
      )

    # Serialize orchestrator runs per issue/PR. Without this, multiple events
    # arriving in quick succession (e.g. the orchestrator's own decision-log
    # comment firing issue_comment + the label-change event) cause concurrent
    # invocations that race past idempotency checks. Saw 4 [Dispatch] log
    # entries within seconds during epic #39's first deployment — this prevents
    # that.
    concurrency:
      group: orchestrator-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The orchestrator instructions live in `.claude/skills/arcane-orchestrator/`
      # (progressive-disclosure skill). claude-code-action discovers it from the
      # checked-out repo and the prompt invokes it via the slash command. Each
      # invocation only loads the matching situation file, not the full decision
      # tree, so context cost is low.
      - uses: anthropics/claude-code-action@v1
        with:
          # `allowed_bots: '*'` lets bot-triggered runs through.
          # The orchestrator reacts to its own decision-log comments (issue_comment events from
          # the claude bot) and to worker-posted BLOCKER comments (also bot). Without this, the
          # entire reactive loop breaks. The job `if:` above is what gates relevance.
          allowed_bots: '*'
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model sonnet --dangerously-skip-permissions"
          settings: '{"advisorModel": "opus"}'
          prompt: |
            Event: ${{ github.event_name }} / ${{ github.event.action }}
            Repo: ${{ github.repository }}
            Issue: #${{ github.event.issue.number }}
            PR: #${{ github.event.pull_request.number }}
            Base ref: ${{ github.event.pull_request.base.ref }}
            Sender: ${{ github.event.sender.login }}

            Run /arcane-orchestrator to route this event. Walk the decision tree top-to-bottom, execute the first matching situation's playbook from `.claude/skills/arcane-orchestrator/situations/`, and stop after one action. Read the references in `.claude/skills/arcane-orchestrator/references/` as needed.
